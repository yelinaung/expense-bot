on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
    - main
    - master
    paths:
    - .github/workflows/semgrep.yml
  schedule:
  # random HH:MM to avoid a load spike on GitHub Actions at 00:00
  - cron: 20 19 * * *
name: Semgrep
permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false

    - name: Run semgrep
      run: semgrep ci --exclude-rule package_managers.renovate.renovate-missing-minimum-release-age.renovate-missing-minimum-release-age

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
      actions: read
    needs: [semgrep]
    steps:
    - name: Export workflow
      uses: corentinmusard/otel-cicd-action@f2d88ecf54d9dd3e01ea95e25f93603212ee93d3 # v4
      with:
        otlpEndpoint: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}/v1/traces
        otlpHeaders: ${{ secrets.OTEL_EXPORTER_HEADERS }}
        githubToken: ${{ secrets.GITHUB_TOKEN }}
