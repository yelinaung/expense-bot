name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # === SECURITY STAGE ===
  secret-detection:
    name: Secret Detection
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        run: |
          if ! command -v gitleaks &>/dev/null; then
            curl --proto "=https" --tlsv1.2 -sSf -L https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.30.0_linux_x64.tar.gz | \
              tar -xz -C /usr/local/bin gitleaks
          fi

      - name: Gitleaks Secret Scan
        run: gitleaks detect --source . --verbose

  sast:
    name: SAST (Semgrep)
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
      security-events: write
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: |
          if ! command -v semgrep &>/dev/null; then
            python -m pip install --require-hashes -r .github/requirements/semgrep.txt
          fi

      - name: Run Semgrep
        run: >-
          semgrep scan --config auto --error
          --exclude-rule=generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
          --exclude-rule=package_managers.renovate.renovate-missing-minimum-release-age.renovate-missing-minimum-release-age
          .

  gosec:
    name: Gosec Security Check
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Install gosec directly using host Go (not Docker action).
      - name: Install gosec
        run: |
          if ! command -v gosec &>/dev/null; then
            (cd .github/tools/gosec && go install -mod=readonly github.com/securego/gosec/v2/cmd/gosec)
          fi
          gosec --version

      - name: Run Gosec Security Scanner
        run: gosec -fmt sarif -out results.sarif ./... || true

      - name: Fix SARIF format for CodeQL
        if: always()
        run: |
          # Remove invalid relationships field that causes validation errors
          jq 'walk(if type == "object" and has("relationships") then del(.relationships) else . end)' results.sarif > results-fixed.sarif
          mv results-fixed.sarif results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
        if: always()

  # === QUALITY STAGE ===
  lint:
    name: Lint
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          install-mode: none
        env:
          GOTOOLCHAIN: auto

  prek:
    name: Pre-commit (prek)
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install tools
        env:
          # renovate: datasource=github-releases depName=j178/prek
          PREK_VERSION: "0.3.11"
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          GOLANGCI_LINT_VERSION: "2.11.4"
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          GOBIN_DIR="$(go env GOPATH)/bin"
          mkdir -p "${GOBIN_DIR}"

          # --- prek ---
          PREK_ARCH="x86_64-unknown-linux-gnu"
          PREK_BASE="https://github.com/j178/prek/releases/download/v${PREK_VERSION}"
          PREK_TARBALL="prek-${PREK_ARCH}.tar.gz"
          PREK_TMP="$(mktemp -d)"
          curl --proto '=https' --tlsv1.2 -sSfL -o "${PREK_TMP}/${PREK_TARBALL}"        "${PREK_BASE}/${PREK_TARBALL}"
          curl --proto '=https' --tlsv1.2 -sSfL -o "${PREK_TMP}/${PREK_TARBALL}.sha256" "${PREK_BASE}/${PREK_TARBALL}.sha256"
          ( cd "${PREK_TMP}" && sha256sum --check --status "${PREK_TARBALL}.sha256" ) || { echo "prek tarball checksum failed"; exit 1; }
          tar -xzf "${PREK_TMP}/${PREK_TARBALL}" -C "${HOME}/.local/bin" --strip-components=1 "prek-${PREK_ARCH}/prek"
          rm -rf "${PREK_TMP}"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

          # --- goimports ---
          (cd .github/tools/goimports && go install -mod=readonly golang.org/x/tools/cmd/goimports)

          # --- golangci-lint ---
          GLCI_ARCH="linux-amd64"
          GLCI_BASE="https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}"
          GLCI_TARBALL="golangci-lint-${GOLANGCI_LINT_VERSION}-${GLCI_ARCH}.tar.gz"
          GLCI_CHECKSUMS="golangci-lint-${GOLANGCI_LINT_VERSION}-checksums.txt"
          GLCI_TMP="$(mktemp -d)"
          curl --proto '=https' --tlsv1.2 -sSfL -o "${GLCI_TMP}/${GLCI_TARBALL}"   "${GLCI_BASE}/${GLCI_TARBALL}"
          curl --proto '=https' --tlsv1.2 -sSfL -o "${GLCI_TMP}/${GLCI_CHECKSUMS}" "${GLCI_BASE}/${GLCI_CHECKSUMS}"
          ( cd "${GLCI_TMP}" && grep " ${GLCI_TARBALL}\$" "${GLCI_CHECKSUMS}" | sha256sum --check --status ) || { echo "golangci-lint tarball checksum failed"; exit 1; }
          tar -xzf "${GLCI_TMP}/${GLCI_TARBALL}" -C "${GOBIN_DIR}" --strip-components=1 "golangci-lint-${GOLANGCI_LINT_VERSION}-${GLCI_ARCH}/golangci-lint"
          rm -rf "${GLCI_TMP}"

      - name: Run prek
        run: prek run --all-files --show-diff-on-failure --color always

  # === TEST STAGE ===
  test:
    name: Test
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    needs: [lint]
    env:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'test' }}
      POSTGRES_DB: expense_bot_test
      POSTGRES_PORT: 5432
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve PostgreSQL container name
        run: |
          echo "PG_CONTAINER=test-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_ENV}"

      - name: Start PostgreSQL container
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        run: |
          set -euo pipefail
          echo "Using PostgreSQL container: ${PG_CONTAINER}"
          docker rm -f "${PG_CONTAINER}" 2>/dev/null || true
          # Share the runner container's network so localhost:5432 is reachable
          # from the test process. Fall back to --network host for bare-metal runners.
          network_flag="--network container:$(hostname)"
          if ! docker run --rm ${network_flag} alpine true 2>/dev/null; then
            network_flag="--network host"
          fi
          echo "Network mode: ${network_flag}"
          docker run -d --name "${PG_CONTAINER}" \
            ${network_flag} \
            --shm-size=256m \
            -e "POSTGRES_USER=${POSTGRES_USER}" \
            -e "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            -e "POSTGRES_DB=${POSTGRES_DB}" \
            postgres:18-alpine

      - name: Wait for PostgreSQL ready
        run: |
          set -euo pipefail
          echo "Waiting for PostgreSQL..."
          ready=0
          for i in $(seq 1 30); do
            # Verify from the runner process (not docker exec) that TCP 5432 is reachable
            if bash -c 'echo > /dev/tcp/localhost/5432' 2>/dev/null; then
              echo "PostgreSQL is ready (TCP verified from runner)"
              ready=1
              break
            fi
            # Check the container hasn't exited
            if ! docker inspect "${PG_CONTAINER}" --format='{{.State.Running}}' 2>/dev/null | grep -q true; then
              echo "PostgreSQL container exited unexpectedly!"
              docker logs "${PG_CONTAINER}" 2>&1 || true
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "PostgreSQL failed to become ready within timeout."
            docker logs "${PG_CONTAINER}" || true
            exit 1
          fi

      - name: Pre-compile test binaries
        run: go test -c -covermode=atomic ./... 2>/dev/null || true

      - name: Verify PostgreSQL still reachable
        run: |
          set -euo pipefail
          if ! bash -c 'echo > /dev/tcp/localhost/5432' 2>/dev/null; then
            echo "PostgreSQL is NOT reachable before test run!"
            docker inspect "${PG_CONTAINER}" --format='Status: {{.State.Status}}, Running: {{.State.Running}}, ExitCode: {{.State.ExitCode}}' 2>&1 || true
            docker logs --tail 50 "${PG_CONTAINER}" 2>&1 || true
            exit 1
          fi
          echo "PostgreSQL still healthy — starting tests"

      - name: Run tests with coverage
        run: |
          export TEST_DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
          mise run test-coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          THRESHOLD=50
          echo "Coverage: ${COVERAGE}% (threshold: ${THRESHOLD}%)"
          if [ "$(awk "BEGIN {print ($COVERAGE < $THRESHOLD)}")" = "1" ]; then
            echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%!"
            exit 1
          fi
          echo "Coverage check passed!"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Stop PostgreSQL
        if: always()
        run: |
          set -euo pipefail
          docker rm -f "${PG_CONTAINER:-test-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}" 2>/dev/null || true

  test-race:
    name: Race Detection
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    needs: [lint]
    env:
      TEST_DATABASE_URL: ""
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run race detector
        run: mise run test-race

  # === DEPENDENCY SECURITY ===
  dependency-review:
    name: Dependency Review
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure

  govulncheck:
    name: Vulnerability Check
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run govulncheck
        run: govulncheck ./...

  otel-export:
    if: always()
    name: OpenTelemetry Export (traces + logs)
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    # Never fail the workflow on a telemetry-export hiccup, and time-bound it so
    # a hung download/API/POST can't keep the job running to the default limit.
    continue-on-error: true
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    needs:
      [
        secret-detection,
        sast,
        gosec,
        lint,
        prek,
        test,
        test-race,
        dependency-review,
        govulncheck,
      ]
    env:
      # renovate: datasource=github-releases depName=equinix-labs/otel-cli
      OTEL_CLI_VERSION: "0.4.5"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_HEADERS }}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_ENDPOINT_HOST_IP: ${{ vars.OTEL_ENDPOINT_HOST_IP }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check OTLP endpoint is configured
        id: guard
        run: |
          if [ -z "${OTEL_EXPORTER_OTLP_ENDPOINT}" ]; then
            echo "OTEL_EXPORTER_OTLP_ENDPOINT not set; skipping export."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Export workflow trace + logs
        if: steps.guard.outputs.skip != 'true'
        run: sh scripts/ci/export-otel-github.sh
