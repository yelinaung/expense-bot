name: Prek Auto-update

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  auto-update:
    name: Update prek hooks
    permissions:
      contents: write
      pull-requests: write
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install prek
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/j178/prek/releases/latest/download/prek-installer.sh | sh

      - name: Run prek auto-update
        run: prek auto-update --cooldown-days 3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/prek-auto-update
          title: "chore: auto-update prek hooks"
          body: |
            Automated update of prek hook versions via `prek auto-update`.

            Review the changes to `.pre-commit-config.yaml` and merge if CI passes.
          commit-message: "chore: auto-update prek hooks"
          labels: dependencies
