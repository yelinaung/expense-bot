name: Prek Auto-update

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    name: Update pre-commit hooks
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install prek
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/j178/prek/releases/latest/download/prek-installer.sh | sh

      - name: Run prek auto-update
        run: prek auto-update --cooldown-days 3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/prek-auto-update
          title: "chore: auto-update pre-commit hooks"
          body: |
            Automated update of pre-commit hook versions via `prek auto-update`.

            Review the changes to `.pre-commit-config.yaml` and merge if CI passes.
          commit-message: "chore: auto-update pre-commit hooks"
          labels: dependencies
