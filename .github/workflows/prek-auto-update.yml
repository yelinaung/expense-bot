name: Prek Auto-update

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  auto-update:
    name: Update prek hooks
    permissions:
      contents: write
      pull-requests: write
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install prek
        env:
          # renovate: datasource=github-releases depName=j178/prek
          PREK_VERSION: "0.3.11"
        run: |
          set -euo pipefail
          ARCH="x86_64-unknown-linux-gnu"
          BASE="https://github.com/j178/prek/releases/download/v${PREK_VERSION}"
          TARBALL="prek-${ARCH}.tar.gz"
          TMPDIR="$(mktemp -d)"
          curl --proto '=https' --tlsv1.2 -sSfL -o "${TMPDIR}/${TARBALL}"        "${BASE}/${TARBALL}"
          curl --proto '=https' --tlsv1.2 -sSfL -o "${TMPDIR}/${TARBALL}.sha256" "${BASE}/${TARBALL}.sha256"
          ( cd "${TMPDIR}" && sha256sum --check --status "${TARBALL}.sha256" ) || { echo "prek tarball checksum failed"; exit 1; }
          mkdir -p "${HOME}/.local/bin"
          tar -xzf "${TMPDIR}/${TARBALL}" -C "${HOME}/.local/bin" --strip-components=1 "prek-${ARCH}/prek"
          rm -rf "${TMPDIR}"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run prek auto-update
        run: prek auto-update --cooldown-days 3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/prek-auto-update
          title: "chore: auto-update prek hooks"
          body: |
            Automated update of prek hook versions via `prek auto-update`.

            Review the changes to `.pre-commit-config.yaml` and merge if CI passes.
          commit-message: "chore: auto-update prek hooks"
          labels: dependencies
