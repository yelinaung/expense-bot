name: Hadolint

on:
  push:
    branches: [master, main]
    paths:
      - '**/Dockerfile'
      - '**/*.Dockerfile'
      - 'Dockerfile.*'
      - '.github/workflows/hadolint.yml'
  pull_request:
    branches: [master, main]
    paths:
      - '**/Dockerfile'
      - '**/*.Dockerfile'
      - 'Dockerfile.*'
      - '.github/workflows/hadolint.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  hadolint:
    name: Lint Dockerfiles
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run hadolint for all Dockerfiles
        run: |
          set -euo pipefail

          mapfile -t dockerfiles < <(git ls-files \
            '**/Dockerfile' \
            '**/*.Dockerfile' \
            'Dockerfile.*')

          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfiles found."
            exit 0
          fi

          echo "Linting ${#dockerfiles[@]} Dockerfile(s)"
          for file in "${dockerfiles[@]}"; do
            echo "==> $file"
            docker run --rm -i hadolint/hadolint < "$file"
          done

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
      actions: read
    needs: [hadolint]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@f2d88ecf54d9dd3e01ea95e25f93603212ee93d3 # v4
        with:
          otlpEndpoint: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          otlpHeaders: ${{ secrets.OTEL_EXPORTER_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
