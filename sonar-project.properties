sonar.projectKey=yelinaung_expense-bot
sonar.organization=yelinaung

# Source configuration
sonar.sources=.
sonar.exclusions=**/*_test.go,**/mocks/**,**/testdata/**
sonar.coverage.exclusions=**/mocks/**,internal/testutil/**/*

# Go coverage report (generated by: go test -coverprofile=coverage.out)
sonar.go.coverage.reportPaths=coverage-sonar.out

# Ignore "pin versions in go install" style rule on the runner Dockerfile;
# versions are pinned via build ARGs above.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S7031
sonar.issue.ignore.multicriteria.e1.resourceKey=runner/Dockerfile
