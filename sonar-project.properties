sonar.projectKey=yelinaung_expense-bot
sonar.organization=yelinaung

# Source configuration
sonar.sources=.
sonar.exclusions=**/*_test.go,**/mocks/**,**/testdata/**
sonar.coverage.exclusions=**/mocks/**,internal/testutil/**/*

# Go coverage report (generated by: go test -coverprofile=coverage.out)
sonar.go.coverage.reportPaths=coverage-sonar.out
