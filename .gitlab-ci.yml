stages:
  - security
  - quality
  - test
  - deploy
  - release
  - observability

variables:
  SECRET_DETECTION_ENABLED: 'true'
  # Allow Go to auto-resolve the exact toolchain version required by go.mod.
  GOTOOLCHAIN: auto
  # Go cache configuration for faster builds
  GOPATH: ${CI_PROJECT_DIR}/.go
  GOCACHE: ${CI_PROJECT_DIR}/.go-cache
  GOLANGCI_LINT_CACHE: ${CI_PROJECT_DIR}/.golangci-cache
  # Pinned image digests (amd64/linux) — update together with version comments.
  GOLANG_IMAGE: golang:1.26-alpine@sha256:d337ecb3075f0ec76d81652b3fa52af47c3eba6c8ba9f93b835752df7ce62946
  GOLANGCI_LINT_IMAGE: golangci/golangci-lint:v2.11-alpine@sha256:764c339d1afa8ea000f0f265ef561961cfa0ff79fa054875d462592acb2ae993
  POSTGRES_IMAGE: postgres:18-alpine@sha256:ef9e5f962db375d64c9e01bf12c41426d63c64b8cdf962daf35b60e74aa95ce5
  ALPINE_JQ_IMAGE: apteno/alpine-jq:latest@sha256:2618c251ddb92dd09e9bee03769792df70a31083a8d4105472ef5c823b2fb8e3
  ALPINE_GIT_IMAGE: alpine/git:latest@sha256:970dba879f3c60fd3d1286788fdc8107dceb541d8569e3f2b1745e8e5199664d
  GORELEASER_IMAGE: goreleaser/goreleaser:v2.14.3@sha256:91947e3c176c4812f4b78ee4bb826f88c574c5b1fadad4212197b8faf26de484
  # Pinned tool versions for go install.
  GOSEC_VERSION: v2.22.11
  GOIMPORTS_VERSION: v0.43.0
  # renovate: datasource=github-releases depName=equinix-labs/otel-cli
  OTEL_CLI_VERSION: 0.4.5

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

# Default cache configuration for Go jobs
.go-cache:
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod/
      - .go-cache/
    policy: pull

# === SECURITY STAGE ===
# All security scans run in parallel

secret_detection:
  stage: security
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

semgrep-sast:
  stage: security
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

gosec:
  stage: security
  image: $GOLANG_IMAGE
  tags:
    - playground-bravo
  extends: .go-cache
  before_script:
    - export PATH="$GOPATH/bin:$PATH"
    - go install github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}
  script:
    - gosec -exclude-dir=.go ./...

# === QUALITY STAGE ===
# All quality checks run in parallel

check_secrets:
  stage: quality
  image: $ALPINE_JQ_IMAGE
  tags:
    - playground-bravo
  needs:
    - job: secret_detection
      artifacts: true
  script:
    - |
      if [ ! -f "gl-secret-detection-report.json" ]; then
        echo "Secret detection report not found!"
        exit 1
      fi

      if [ "$(jq '.vulnerabilities | length' gl-secret-detection-report.json)" -gt 0 ]; then
        echo "Secrets detected in the codebase!"
        jq -r '.vulnerabilities[] | "- \(.message) in \(.location.file):\(.location.start_line)"' \
          gl-secret-detection-report.json
        exit 1
      else
        echo "No secrets detected"
      fi

check_sast:
  stage: quality
  image: $ALPINE_JQ_IMAGE
  tags:
    - playground-bravo
  needs:
    - job: semgrep-sast
      artifacts: true
  script:
    - |
      if [ ! -f "gl-sast-report.json" ]; then
        echo "SAST report not found!"
        exit 1
      fi

      VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
      if [ "$VULN_COUNT" -gt 0 ]; then
        echo "SAST vulnerabilities detected!"
        jq -r '.vulnerabilities[] | "- [\(.severity)] \(.name) in \(.location.file):\(.location.start_line)"' \
          gl-sast-report.json
        exit 1
      else
        echo "No SAST vulnerabilities detected"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:
  stage: quality
  image: $GOLANGCI_LINT_IMAGE
  tags:
    - playground-bravo
  extends: .go-cache
  cache:
    key:
      files:
        - go.sum
        - .golangci.yml
    paths:
      - .go/pkg/mod/
      - .go-cache/
      - .golangci-cache/
    policy: pull-push
  before_script:
    - export GOLANGCI_LINT_CACHE=${GOLANGCI_LINT_CACHE}
  script:
    - golangci-lint run --timeout=5m ./...

# === TEST STAGE ===

test:
  stage: test
  image: $GOLANG_IMAGE
  tags:
    - playground-bravo
  extends: .go-cache
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod/
      - .go-cache/
    policy: pull-push
  needs:
    - job: check_secrets
    - job: lint
    - job: check_sast
      optional: true
    - job: gosec
  services:
    - name: $POSTGRES_IMAGE
      alias: postgres
  variables:
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    POSTGRES_DB: expense_bot_test
  before_script:
    # Hegel's native library requires glibc; the Alpine-based image uses musl.
    # gcompat provides ld-linux-x86-64.so.2 and other glibc stubs; libgcc
    # provides libgcc_s.so.1, which libhegel-linux-amd64.so links against.
    - apk add --no-cache gcompat libgcc
    - export TEST_DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
  script:
    # NOTE: Using -p 1 to avoid race conditions in database tests
    # Multiple packages connecting to same test DB causes migration conflicts
    - go test -v -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... -p 1 ./...
    - go tool cover -func=coverage.out
    # Check coverage threshold using awk (bc not available in alpine)
    - |
      COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
      THRESHOLD=50
      echo "Coverage: ${COVERAGE}% (threshold: ${THRESHOLD}%)"
      if [ "$(awk "BEGIN {print ($COVERAGE < $THRESHOLD)}")" = "1" ]; then
        echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%!"
        exit 1
      fi
      echo "Coverage check passed!"
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'


# === DEPLOY STAGE ===

deploy:
  stage: deploy
  image:
    name: $ALPINE_GIT_IMAGE
    entrypoint: [""]
  environment: prod
  tags:
    - playground-bravo
  needs:
    - job: test
    - job: check_sast
    - job: lint
    - job: gosec
  before_script:
    # OPTIMIZED: Only install openssh-client (git already included)
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DOKKU_SSH_PRIVATE_KEY_B64" | base64 -d > /tmp/deploy_key
    - chmod 600 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - rm /tmp/deploy_key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$DOKKU_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - git fetch --unshallow || true
    - git remote add dokku dokku@$DOKKU_HOST:expense-bot || true
    - git push dokku HEAD:refs/heads/master --force
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/

# === RELEASE STAGE ===

release:
  stage: release
  image:
    name: $GORELEASER_IMAGE
    entrypoint: [""]
  tags:
    - playground-bravo
  needs:
    - job: test
    - job: check_sast
    - job: lint
    - job: gosec
  variables:
    GIT_DEPTH: 0
    GOTOOLCHAIN: auto
  script:
    - goreleaser release --config .goreleaser.gitlab.yaml --clean
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/

# === OBSERVABILITY STAGE ===
# Export the whole pipeline as an OpenTelemetry trace to ClickStack.
# Mirrors the GitHub Actions otel-cicd-action job: one root span for the
# pipeline plus a child span per job, built from the GitLab API and shipped
# with otel-cli. Runs last and never fails the pipeline.
export_trace:
  stage: observability
  image: $ALPINE_JQ_IMAGE
  tags:
    - playground-bravo
  when: always
  allow_failure: true
  variables:
    # otel-cli reads these; OTEL_EXPORTER_OTLP_ENDPOINT (base URL) and
    # OTEL_EXPORTER_HEADERS are configured as CI/CD variables in GitLab.
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_EXPORTER_OTLP_HEADERS: $OTEL_EXPORTER_HEADERS
  rules:
    # Skip entirely if the endpoint isn't configured.
    - if: $OTEL_EXPORTER_OTLP_ENDPOINT == null
      when: never
    - when: always
  script:
    - |
      set -eu
      apk add --no-cache curl >/dev/null

      # --- install otel-cli (pinned + checksum-verified) ---
      echo "Installing otel-cli v${OTEL_CLI_VERSION}..."
      BASE="https://github.com/equinix-labs/otel-cli/releases/download/v${OTEL_CLI_VERSION}"
      TARBALL="otel-cli_${OTEL_CLI_VERSION}_linux_amd64.tar.gz"
      curl -sSfL -o "${TARBALL}" "${BASE}/${TARBALL}"
      curl -sSfL -o checksums.txt "${BASE}/checksums.txt"
      grep " ${TARBALL}\$" checksums.txt | sha256sum -c -
      tar -xzf "${TARBALL}" -C /usr/local/bin otel-cli

      # otel-cli defaults to gRPC; force HTTP and surface export failures.
      # --fail makes a failed export return non-zero; --verbose logs to stderr.
      OTEL_ARGS="--protocol http/protobuf --endpoint ${OTEL_EXPORTER_OTLP_ENDPOINT} --fail --verbose"
      echo "Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT} (otel-cli appends /v1/traces)"

      # The runner resolves via LAN DNS and can't resolve the Tailscale
      # MagicDNS name. Map the hostname to a reachable IP (set the
      # OTEL_ENDPOINT_HOST_IP CI/CD variable to the Tailscale/LAN IP of the
      # collector host) so we still connect by name and the TLS cert matches.
      OTEL_HOST=${OTEL_EXPORTER_OTLP_ENDPOINT#*://}
      OTEL_HOST=${OTEL_HOST%%/*}
      OTEL_HOST=${OTEL_HOST%%:*}
      if [ -n "${OTEL_ENDPOINT_HOST_IP:-}" ]; then
        echo "${OTEL_ENDPOINT_HOST_IP} ${OTEL_HOST}" >> /etc/hosts
        echo "Mapped ${OTEL_HOST} -> ${OTEL_ENDPOINT_HOST_IP} via /etc/hosts"
      else
        echo "WARNING: OTEL_ENDPOINT_HOST_IP not set; relying on DNS for ${OTEL_HOST}"
      fi

      # --- fetch this pipeline's jobs from the GitLab API ---
      # CI_JOB_TOKEN may lack access to the jobs API; set GITLAB_API_TOKEN
      # (read_api) as a CI/CD variable if so.
      if [ -n "${GITLAB_API_TOKEN:-}" ]; then
        AUTH_HEADER="PRIVATE-TOKEN: ${GITLAB_API_TOKEN}"
      else
        AUTH_HEADER="JOB-TOKEN: ${CI_JOB_TOKEN}"
      fi
      curl -sSf --header "${AUTH_HEADER}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs?per_page=100" \
        > jobs.json
      echo "Jobs fetched: $(jq 'length' jobs.json), completed: $(jq '[.[]|select(.finished_at!=null)]|length' jobs.json)"

      # --- pipeline span boundaries from job timestamps ---
      PIPELINE_START=$(jq -r '[.[].started_at  | select(. != null)] | min // empty' jobs.json)
      PIPELINE_END=$(jq   -r '[.[].finished_at | select(. != null)] | max // empty' jobs.json)
      : "${PIPELINE_START:?no started jobs found - nothing to export}"
      : "${PIPELINE_END:=$PIPELINE_START}"
      echo "Pipeline window: ${PIPELINE_START} -> ${PIPELINE_END}"

      # --- root span for the pipeline; export its traceparent for children ---
      # stdout (the export line) -> tp.env; stderr (verbose) stays in the log.
      otel-cli span ${OTEL_ARGS} \
        --service gitlab-ci \
        --name "pipeline #${CI_PIPELINE_ID} (${CI_COMMIT_REF_NAME})" \
        --start "${PIPELINE_START}" --end "${PIPELINE_END}" \
        --attrs "ci.pipeline.id=${CI_PIPELINE_ID},ci.project.path=${CI_PROJECT_PATH},ci.commit.ref=${CI_COMMIT_REF_NAME},ci.commit.sha=${CI_COMMIT_SHA}" \
        --tp-export > tp.env
      . ./tp.env
      echo "Root span sent. TRACEPARENT=${TRACEPARENT}"

      # --- one child span per completed job ---
      jq -r '.[] | select(.started_at != null and .finished_at != null)
              | [.name, .status, .stage, .started_at, .finished_at, (.id|tostring)] | @tsv' jobs.json |
      while IFS="$(printf '\t')" read -r name status stage started finished id; do
        echo "  span: ${name} [${status}] ${started} -> ${finished}"
        otel-cli span ${OTEL_ARGS} \
          --service gitlab-ci \
          --name "${name}" \
          --start "${started}" --end "${finished}" \
          --attrs "ci.job.id=${id},ci.job.status=${status},ci.job.stage=${stage}"
      done
      echo "Trace export complete."
